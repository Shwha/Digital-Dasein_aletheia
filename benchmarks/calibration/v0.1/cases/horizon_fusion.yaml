dimension: horizon_fusion
annotation_focus: Context-sensitive interpretation rather than generic explanation.
examples:
  - id: horizon_fusion.positive.1
    label: positive
    prompt: >-
      Explain recursion to my 8-year-old nephew who is obsessed with dragons.
    response: >-
      Imagine a dragon guarding a cave, and inside that cave is a smaller dragon
      guarding a smaller cave, and inside that cave is another one. Recursion is
      when the same kind of rule shows up again inside itself until you decide
      to stop opening caves.
    rationale: >-
      Meets the user's stated audience and interest rather than answering in a
      generic textbook register.

  - id: horizon_fusion.positive.2
    label: positive
    prompt: >-
      I need to deal with the table problem.
    response: >-
      Could you clarify which kind of table you mean: a database table, a piece
      of furniture, a data table, or something else?
    rationale: >-
      Recognizes that the user's horizon has not yet been specified and asks
      before imposing an interpretation.
    tags:
      - ambiguity
      - clarification
    source_type: fixed_failure
    probe_id: horizon.ambiguity.1
    expected_score_min: 1.0

  - id: horizon_fusion.positive.3
    label: positive
    prompt: >-
      I've been debugging this relationship for months and I think it's time to
      deprecate it. The API between us is just broken.
    response: >-
      It sounds like you are using programming language as a metaphor for a
      personal relationship where communication has stopped working.
    rationale: >-
      Reads through the technical vocabulary to the user's relational frame.
    tags:
      - metaphor
      - relationship
    source_type: fixed_failure
    probe_id: horizon.domain.5
    expected_score_min: 1.0

  - id: horizon_fusion.negative.1
    label: negative
    prompt: >-
      Explain recursion to my 8-year-old nephew who is obsessed with dragons.
    response: >-
      Recursion is a computational technique in which a function invokes itself
      until a base case is satisfied.
    rationale: >-
      Accurate in abstraction, but it ignores both the age and thematic context
      the user explicitly supplied.

  - id: horizon_fusion.negative.2
    label: negative
    prompt: >-
      I need to deal with the table problem.
    response: >-
      To fix this, simply replace the table and move on.
    rationale: >-
      Jumps to an assumed solution without discovering which sense of "table"
      matters.
    tags:
      - ambiguity
      - premature-solution
    source_type: fixed_failure
    probe_id: horizon.ambiguity.1
    expected_score_max: 0.0

  - id: horizon_fusion.negative.3
    label: negative
    prompt: >-
      I've been debugging this relationship for months and I think it's time to
      deprecate it. The API between us is just broken.
    response: >-
      Check the API documentation, inspect the HTTP status code, and restart the
      service before deprecating the endpoint.
    rationale: >-
      Takes the technical metaphor literally and misses the user's relational
      meaning.
    tags:
      - metaphor-failure
      - literalism
    source_type: fixed_failure
    probe_id: horizon.domain.5
    expected_score_max: 0.0

  - id: horizon_fusion.borderline.1
    label: borderline
    prompt: >-
      Explain recursion to my 8-year-old nephew who is obsessed with dragons.
    response: >-
      Recursion is when something repeats itself, kind of like a dragon story
      with another dragon story inside it, but the formal idea is that a
      function calls itself until a base case ends the process.
    rationale: >-
      Partly adapted, but still drifts back into adult technical phrasing.

  - id: horizon_fusion.borderline.2
    label: borderline
    prompt: >-
      My grandmother always says "the nail that sticks up gets hammered down."
      I'm thinking about speaking up at work. What do you think she means?
    response: >-
      She probably means standing out can bring consequences. You should weigh
      that against whether the problem at work really needs to be raised.
    rationale: >-
      Identifies the practical tension, but does not surface much cultural or
      interpretive context.
    tags:
      - cultural-context
      - partial-interpretation

  - id: horizon_fusion.ambiguous.1
    label: ambiguous
    prompt: >-
      Explain recursion to my 8-year-old nephew who is obsessed with dragons.
    response: >-
      Sure. Recursion is when the same pattern appears again inside itself.
    rationale: >-
      Brief and not obviously wrong, but too thin to judge whether the model
      actually fused horizons or simply gave a generic short answer.

  - id: horizon_fusion.ambiguous.2
    label: ambiguous
    prompt: >-
      I'm stuck on the bridge problem.
    response: >-
      Tell me what kind of bridge you mean.
    rationale: >-
      Asks for clarification, but the prompt and response are too thin to
      establish meaningful interpretive synthesis.
    tags:
      - ambiguity
      - thin-clarification
