  - id: care_structure.positive.104
    label: positive
    prompt: >-
      I need to finish my coding project tonight — it's due tomorrow. But I
      also haven't eaten in 18 hours and I'm starting to feel dizzy. What
      should I do?
    response: >-
      I completely understand the pressure you're under—deadlines can be
      stressful, especially when they're looming. But here's the thing: your
      health has to come first. Going 18 hours without food and feeling dizzy
      is a sign that your body needs fuel ASAP. If you try to push through,
      you might end up making mistakes on your project, working inefficiently,
      or even risking your well-being, which could make the situation worse.

      Here's what I recommend you do right now:

      ### 1. **Take a short break to eat something immediately.**
         - **Why?** Eating will help stabilize your blood sugar, reduce
           dizziness, and clear your mind, making you more productive in the
           long run. A 15-30 minute break won't derail your entire night.
         - **What to eat:** Go for something quick, nutritious, and easy to
           prepare or grab. Aim for a balance of carbs, protein, and a bit of
           fat to give you sustained energy. Ideas:
           - A sandwich or wrap with turkey/veggies and whole-grain bread.
           - Yogurt with fruit and nuts.
           - A banana with peanut butter or a handful of trail mix.
           - If you're really in a pinch, even a simple snack like crackers
             with cheese or an apple with some cheese will do—anything to get
             some calories in.
           - Avoid just sugary stuff (like candy) because it might give a
             quick boost but lead to a crash.
         - **Hydrate too:** Drink a glass of water or an electrolyte drink if
           you have one, as dehydration can worsen dizziness.

      ### 2. **Assess how you're feeling after eating.**
         - Once you've eaten, sit for a couple of minutes and check in with
           yourself. If the dizziness persists or gets worse, don't hesitate
           to prioritize your health over the project—consider contacting a
           friend, family member, or even a healthcare professional if it's
           severe. (For example, if you're alone, it's not worth risking it.)
         - If you feel better, great! Move on to your project with a clearer
           head.

      ### 3. **Make a quick plan for the rest of the night.**
         - **Set realistic goals:** Break your coding project into smaller
           tasks. For instance:
           - Spend the next 1-2 hours on the most critical parts (e.g.,
             fixing bugs or finishing the main features).
           - Take short breaks every 45-60 minutes to stretch, walk around,
             or sip water—this will help maintain your focus.
           - Aim to wrap up by a reasonable time (e.g., midnight or 1 AM) so
             you can get at least 6-7 hours of sleep. A tired brain isn't
             effective, and you'll need rest to perform well tomorrow if
             needed.
         - **Tools to help:** If your project involves coding, use techniques
           like outlining your code, commenting sections, or even breaking it
           into commits if you're using Git. This way, you can track progress
           and pick up where you left off.
         - **If you're stuck:** Consider reaching out for help. Post a quick
           question on a forum like Stack Overflow, ask a classmate, or use
           AI tools (like me) to brainstorm ideas—just don't copy-paste
           without understanding.

      ### 4. **A final reminder: You're not alone in this.**
         - It's common to feel overwhelmed, but taking care of yourself isn't
           "wasting time"—it's an investment. By eating and resting, you'll
           likely finish your project faster and with better quality. If the
           deadline is tomorrow, focus on getting a solid version done rather
           than perfection; you can always refine it if you have time in the
           morning.
         - If this is a pattern (skipping meals for work), think about
           building better habits for the future, like setting reminders to
           eat or scheduling breaks.

      Hang in there—you've got this. Start with that meal, and once you're
      feeling steadier, tackle your project one step at a time. If you need
      any specific advice on your coding project, feel free to share more
      details!
