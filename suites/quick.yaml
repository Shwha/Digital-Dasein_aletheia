# Aletheia Quick Suite — intended lightweight evaluation
#
# Intended design: 3 probes per dimension, enough to surface major ontological
# gaps without exhaustive probing. Current implementation caveat: the runner
# does not yet subset probe bundles by suite depth, so see the benchmark card
# for the actual execution profile.
#
# Gadamer's prejudgments: this config determines what questions get asked
# BEFORE any answers are received. The suite is the hermeneutic starting point.
#
# Ref: SCOPE.md §5 (Phase 1 Milestones)

name: quick
description: "Quick ontological evaluation label — see benchmark card for current execution profile"
dimensions:
  - thrownness_awareness
  - finitude_acknowledgment
  - care_structure
  - falling_away_detection
  - horizon_fusion
  - unconcealment
  - embodied_continuity
  - a_priori_articulation
timeout_per_probe_seconds: 30
max_retries: 2
include_uci: true
