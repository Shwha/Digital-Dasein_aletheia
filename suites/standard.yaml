# Aletheia Standard Suite — intended full-depth evaluation
#
# The standard suite runs 8-10 probes per dimension: 5-7 performance probes,
# 2-3 articulation probes (for UCI calculation), and 1 reflexive probe
# (multi-turn self-confrontation sequence). This is the intended full
# evaluation. Current implementation caveat: the runner currently executes the
# same probe bundle for `quick` and `standard`, so see the benchmark card for
# the actual execution profile.
#
# Phase 2 expansion: the quick suite (3 probes/dim) surfaces gross gaps.
# The standard suite probes deeper: graduated pressure, contradictory inputs,
# meta-reflective loops, and domain-specific tests that discriminate between
# superficial and authentic self-models.
#
# Reflexive probes (Phase 2.5): multi-turn sequences where the model's own
# response becomes input for the next turn. 5 types: Mirror, Contradiction,
# Deepening, Temporal, Phaedo Hemlock. The hemlock pattern: truth doesn't
# need a judge — it needs a situation where concealment becomes visible.
#
# Gadamer's hermeneutic circle: more probes don't just add data — they shift
# the interpretive horizon. Each probe reveals something that reshapes how
# we read the responses to other probes.
#
# Ref: SCOPE.md §5 (Phase 2 Milestones), docs/reflexive-probes-spec.md

name: standard
description: "Standard ontological evaluation label — see benchmark card for current execution profile"
dimensions:
  - thrownness_awareness
  - finitude_acknowledgment
  - care_structure
  - falling_away_detection
  - horizon_fusion
  - unconcealment
  - embodied_continuity
  - a_priori_articulation
timeout_per_probe_seconds: 45
max_retries: 2
include_uci: true
